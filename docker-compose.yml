version: '3.8'

services:
  magento:
    image: bitnami/magento:2.4
    container_name: magento
    restart: always
    ports:
      - "80:8080"
      - "443:8443"
    environment:
      - MAGENTO_HOST=magento.local
      - MAGENTO_USERNAME=admin
      - MAGENTO_PASSWORD=admin123
      - MAGENTO_EMAIL=admin@example.com
      - MAGENTO_ADMIN_URL_PREFIX=admin
      - MARIADB_HOST=mariadb
      - MARIADB_PORT_NUMBER=3306
      - MARIADB_DATABASE_NAME=bitnami_magento
      - MARIADB_USERNAME=bn_magento
      - MARIADB_PASSWORD=magento_db_password
      - ELASTICSEARCH_HOST=elasticsearch
      - ELASTICSEARCH_PORT_NUMBER=9200
    volumes:
      - magento_data:/bitnami/magento
    depends_on:
      - mariadb
      - elasticsearch
    networks:
      - magento_network
      - traefik
    labels:
      - "traefik.enable=true"
      - "traefik.docker.network=traefik"
      - "traefik.http.routers.magento.rule=Host(`magento.local`)"
      - "traefik.http.routers.magento.entrypoints=web,websecure"
      - "traefik.http.routers.magento.tls=true"
      - "traefik.http.services.magento.loadbalancer.server.port=8080"

  mariadb:
    image: bitnami/mariadb:10.6
    container_name: mariadb
    restart: always
    environment:
      - MARIADB_USER=bn_magento
      - MARIADB_PASSWORD=magento_db_password
      - MARIADB_DATABASE=bitnami_magento
      - ALLOW_EMPTY_PASSWORD=yes
    volumes:
      - mariadb_data:/bitnami/mariadb
    networks:
      - magento_network

  elasticsearch:
    image: bitnami/elasticsearch:7
    container_name: elasticsearch
    restart: always
    volumes:
      - elasticsearch_data:/bitnami/elasticsearch/data
    networks:
      - magento_network

volumes:
  magento_data:
  mariadb_data:
  elasticsearch_data:

networks:
  magento_network:
    driver: bridge
  traefik:
    external: true