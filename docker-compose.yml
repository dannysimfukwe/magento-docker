version: '3.8'

services:
  app:
    build:
      context: .
      dockerfile: Dockerfile
    ports:
      - "80:80"
      - "443:443"
    environment:
      - TRAEFIK_HOST=magento.local
      - MAGENTO_DB_HOST=mariadb
      - MAGENTO_DB_NAME=magento
      - MAGENTO_DB_USER=root
      - MAGENTO_DB_PASSWORD=magento123
      - MAGENTO_BASE_URL=http://magento.local
      - MAGENTO_BACKEND_FRONTNAME=admin
      - MAGENTO_ADMIN_EMAIL=admin@example.com
      - MAGENTO_ADMIN_USER=admin
      - MAGENTO_ADMIN_PASSWORD=Admin123456
    volumes:
      - app_data:/var/www/html
    depends_on:
      - mariadb
    networks:
      - magento_network
      - traefik
    labels:
      - "traefik.enable=true"
      - "traefik.docker.network=traefik"
      - "traefik.http.routers.magento.rule=Host(`magento.local`)"
      - "traefik.http.routers.magento.entrypoints=web,websecure"
      - "traefik.http.routers.magento.tls=true"
      - "traefik.http.services.magento.loadbalancer.server.port=80"

  mariadb:
    image: mariadb:latest
    environment:
      - MYSQL_ROOT_PASSWORD=magento123
      - MYSQL_DATABASE=magento
    volumes:
      - db_data:/var/lib/mysql
    networks:
      - magento_network

volumes:
  app_data:
  db_data:

networks:
  magento_network:
    driver: bridge
  traefik:
    external: true